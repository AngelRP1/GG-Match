name: CI/CD Pipeline GG-Match

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Instalar CLI de DigitalOcean
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Iniciar sesión en el Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Construir imagen de Docker
        run: docker build -t registry.digitalocean.com/gg-match-registry/gg-match-api:latest ./auth-service

      - name: Subir imagen al Registry
        run: docker push registry.digitalocean.com/gg-match-registry/gg-match-api:latest

      - name: Desplegar en el Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Entrar al registro privado desde el servidor
            docker login registry.digitalocean.com -u ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }} -p ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
            cd ~/GG-Match
            
            # Forzar la descarga de la nueva imagen
            docker pull registry.digitalocean.com/gg-match-registry/gg-match-api:latest
            
            # Reiniciar los contenedores con el código nuevo
            docker-compose up -d